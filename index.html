<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#1e1e2f;
            font-family:Arial;
        }

        .calculator{
            background:#2d2d44;
            padding:20px;
            border-radius:15px;
            width:320px;
        }

        #display{
            width:100%;
            height:60px;
            margin-bottom:15px;
            font-size:28px;
            text-align:right;
            border:none;
            border-radius:10px;
            padding:10px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
        }

        button{
            height:60px;
            font-size:22px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .num{
            background:#f1f1f1;
        }

        .op{
            background:orange;
            color:white;
        }

        .equal{
            background:green;
            color:white;
        }

        .clear{
            background:red;
            color:white;
        }

    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" readonly>

        <div class="buttons">

            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="op" onclick="append('/')">/</button>
            <button class="op" onclick="append('*')">*</button>
            <button class="op" onclick="append('-')">-</button>

            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="op" onclick="append('+')">+</button>

            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>

            <button class="num" onclick="append('0')">0</button>
            <button class="num" onclick="append('.')">.</button>

        </div>

    </div>

    <script>

        let display = document.getElementById("display");

        function append(value){
            display.value += value;
        }

        function clearDisplay(){
            display.value = "";
        }

        function calculate(){
            try{
                display.value = eval(display.value);
            }
            catch{
                display.value = "Error";
            }
        }

    </script>

</body>
</html>
